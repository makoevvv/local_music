services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-local_music}
      POSTGRES_USER: ${POSTGRES_USER:-music}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-music} -d ${POSTGRES_DB:-local_music}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  proxy:
    image: ghcr.io/sagernet/sing-box:v1.11.5
    profiles: ["proxy"]
    restart: unless-stopped
    volumes:
      - ./proxy/sing-box.config.json:/etc/sing-box/config.json:ro
    command: ["run", "-c", "/etc/sing-box/config.json"]

  # YouTube PO Token — avoids manual browser cookies (see bgutil-ytdlp-pot-provider).
  ytdlp-pot:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    init: true
    restart: unless-stopped
    environment:
      HTTP_PROXY: ${YTDLP_PROXY:-}
      HTTPS_PROXY: ${YTDLP_PROXY:-}

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-music}:${POSTGRES_PASSWORD:-change-me-db}@postgres:5432/${POSTGRES_DB:-local_music}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ../data/storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ytdlp-pot:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-music}:${POSTGRES_PASSWORD:-change-me-db}@postgres:5432/${POSTGRES_DB:-local_music}
    command: ["rq", "worker", "default", "--url", "redis://redis:6379/0"]
    volumes:
      - ../data/storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ytdlp-pot:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
