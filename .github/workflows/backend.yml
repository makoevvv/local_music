name: Backend CI

on:
  push:
    branches: [main, "stage/**"]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: local_music
          POSTGRES_USER: music
          POSTGRES_PASSWORD: music
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U music -d local_music"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      APP_SECRET_KEY: ci-secret-key-at-least-32-characters
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
      DATABASE_URL: postgresql+asyncpg://music:music@localhost:5432/local_music
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app

      - name: Apply migrations
        run: alembic upgrade head

      - name: Pytest
        run: pytest
